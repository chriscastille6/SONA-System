# Render Blueprint Configuration for PRAMS
# Deploy with: render blueprint
# Docs: docs/PRAMS_CLOUD_GITLAB_DEPLOY.md

services:
  - type: web
    name: prams-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: INSTITUTION_NAME
        value: Nicholls State University
      - key: SITE_NAME
        value: Participant Recruitment and Management System (PRAMS)
      - key: DATABASE_URL
        fromDatabase:
          name: prams-database
          property: connectionString
      - key: RENDER
        value: true

databases:
  - name: prams-database
    databaseName: prams_db
    user: prams_user
    plan: free
