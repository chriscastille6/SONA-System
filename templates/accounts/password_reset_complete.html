{% extends 'base.html' %}

{% block title %}Password Changed - {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Password changed</h2>
                <p>Your password has been set. You can now log in with your new password.</p>
                <div class="mt-3 text-center">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log in</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
