# MCP data layer for PRAMS agents (MindsDB universal SQL + MCP Toolbox)
# Start: ./scripts/mcp-start.sh
# Docs: docs/MCP_DATA_LAYER.md

services:
  mindsdb:
    image: mindsdb/mindsdb:latest
    ports:
      - "47334:47334"   # HTTP API + SQL editor
      - "47335:47335"   # MySQL wire protocol (MCP Toolbox connects here)
    environment:
      MINDSDB_APIS: http,mysql
      MINDSDB_STORAGE_PATH: /root/mindsdb_storage
    volumes:
      - mindsdb_data:/root/mindsdb_storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47334/api/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  mindsdb_data:
